<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxford Navigate B2 · Reading Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,400&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:    #0e0e16;
            --amber:  #c8933a;
            --amber2: #e8b45a;
            --amber3: #f5d080;
            --cream:  #f2ebe0;
            --muted:  rgba(242,235,224,0.5);
            --red:    #ff4444; 
            --green:  #3a9e68; 
            --border: rgba(200,147,58,0.22);
            --glass:  rgba(255,255,255,0.03);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Mulish',sans-serif; min-height:100vh; background:var(--ink); color:var(--cream); overflow-x:hidden; }
        .bg { position:fixed; inset:0; z-index:0; background: radial-gradient(ellipse 60% 40% at 20% 30%, rgba(200,147,58,0.09) 0%, transparent 65%), linear-gradient(160deg, #080810 0%, #0e0e18 100%); }
        #app { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .card { background:rgba(12,12,20,0.94); backdrop-filter:blur(24px); border:1px solid var(--border); border-radius:22px; width:100%; max-width:900px; box-shadow:0 40px 100px rgba(0,0,0,0.7); overflow:hidden; }
        .screen { padding:40px; display:none; }
        .active { display:block; }
        .ts-btn { background:var(--glass); border:1.5px solid var(--border); border-radius:12px; padding:15px; cursor:pointer; margin-bottom:10px; display:flex; align-items:center; gap:15px; transition:0.2s; }
        .ts-btn.selected { border-color:var(--amber2); background:rgba(200,147,58,0.12); }
        .ts-num { font-family:'Lora',serif; font-size:22px; color:var(--amber2); min-width:30px; }
        .article-wrap { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.07); border-radius:14px; padding:20px; margin-bottom:25px; max-height:280px; overflow-y:auto; line-height:1.8; color:rgba(242,235,224,0.85); }
        .exercise-block { border:1px solid var(--border); border-radius:12px; margin-bottom:20px; overflow:hidden; }
        .exercise-header { background:rgba(200,147,58,0.08); padding:12px 15px; font-weight:700; color:var(--amber2); font-size:14px; text-transform:uppercase; letter-spacing:1px; }
        .exercise-body { padding:20px; }
        .opt { background:var(--glass); border:1.5px solid rgba(255,255,255,0.1); border-radius:8px; padding:12px; cursor:pointer; margin-top:8px; display:flex; align-items:center; gap:10px; transition:0.2s; }
        .opt.selected { border-color:var(--amber); background:rgba(200,147,58,0.15); }
        .opt-lbl { width:22px; height:22px; border-radius:50%; border:1px solid rgba(255,255,255,0.3); display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; }
        .tf-row { display:flex; gap:10px; width:180px; }
        .tf-btn { flex:1; padding:10px; border:1px solid rgba(255,255,255,0.1); border-radius:8px; text-align:center; cursor:pointer; background:var(--glass); transition:0.2s; }
        .tf-btn.selected { background:var(--amber); color:var(--ink); font-weight:700; border-color:var(--amber); }
        .rv-item { background:rgba(255,255,255,0.03); border-radius:10px; padding:18px; margin-bottom:12px; border-left:4px solid transparent; }
        .rv-correct-box { border-left-color: var(--green); }
        .rv-wrong-box { border-left-color: var(--red); }
        .text-green { color: var(--green); font-weight:700; }
        .text-red { color: var(--red); font-weight:700; }
        .explanation { font-size:13px; color:var(--muted); margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.05); font-style:italic; }
        .btn { padding:14px 28px; border-radius:8px; border:none; cursor:pointer; font-weight:700; transition:0.3s; font-family:'Mulish'; width:100%; }
        .btn-primary { background:var(--amber); color:var(--ink); }
        @media (max-width: 600px) { .screen { padding:20px; } }
    </style>
</head>
<body>
<div class="bg"></div>
<div id="app">
    <div class="card">
        <div id="intro-screen" class="screen active">
            <h1 style="font-family:'Lora'; font-size:32px; text-align:center; margin-bottom:30px;">Reading <em>Comprehension</em></h1>
            <div id="text-list"></div>
            <button class="btn btn-primary" onclick="showScreen('name-screen')" id="next-btn" disabled style="margin-top:10px; opacity:0.4;">Select a text →</button>
        </div>
        <div id="name-screen" class="screen">
            <h2 style="font-family:'Lora'; margin-bottom:15px;">Student <em>Name</em></h2>
            <input type="text" id="user-name" placeholder="Enter your name..." style="width:100%; padding:16px; margin-bottom:20px; background:var(--glass); border:1px solid var(--amber); color:white; border-radius:10px; font-size:16px;">
            <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
        </div>
        <div id="quiz-screen" class="screen">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 id="q-title" style="font-family:'Lora';"></h3>
                <div id="timer" style="font-size:24px; color:var(--amber2)">08:00</div>
            </div>
            <div class="article-wrap" id="article-content"></div>
            <div id="ex1-render"></div>
            <div id="ex2-render"></div>
            <button class="btn btn-primary" onclick="endQuiz()">Submit Answers</button>
        </div>
        <div id="result-screen" class="screen">
            <h2 id="res-header" style="text-align:center;"></h2>
            <div id="score-box" style="font-size:48px; text-align:center; margin:20px 0; color:var(--amber2)"></div>
            <div id="review-area"></div>
            <button class="btn btn-primary" onclick="location.reload()" style="margin-top:20px;">Return to Menu</button>
        </div>
    </div>
</div>
<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbz6QvFAjEmRJi-L3MJw4b4cCduPyeVX1YO6Ij-b-5DdUX9fgH6u1j5SfefcvutM_8vf/exec';

const DATA = [
    {
        title: "The Carrot or the Stick?",
        topic: "Business · Psychology",
        text: `<p>In business, managers constantly look for ways to improve staff productivity. The 'carrot and the stick' is a classic metaphor borrowed from the idea of motivating a donkey to move. The 'carrot' represents a reward — such as a bonus or promotion — while the 'stick' represents punishment, typically the fear of losing one's job.</p>
<p>Historically, the 'stick' approach was common in factories during the Industrial Revolution. Owners assumed that people were naturally lazy and needed to be forced to work. This method can be effective for simple, repetitive tasks where output is easy to measure. However, research shows that for creative or complex jobs, stress and fear actually reduce problem-solving abilities and stifle innovation.</p>
<p>The 'carrot' approach is more positive, using prizes or financial bonuses to encourage effort. However, psychologists have found that after a certain point, more money does not mean harder work. Once employees feel financially comfortable, they may lose interest in the quality of their output and focus only on completing tasks to earn the reward.</p>
<p>The most effective leaders understand that neither the carrot nor the stick alone is sufficient. Instead, great leaders motivate people by providing a sense of purpose, autonomy, and respect. When employees feel that their work is meaningful and that their contributions are valued, they are far more likely to perform at their best — not because they fear punishment or expect a reward, but because they genuinely care about the outcome.</p>`,
        ex1: [
            { q: "The 'stick' method works best for...", opts: ["Creative work", "Simple, repetitive tasks", "Team building", "High-level management"], a: 1, exp: "Paragraph 2 states the stick approach works well for simple, repetitive tasks where output is easy to measure." },
            { q: "Financial rewards (carrots) can be negative because...", opts: ["They are too expensive", "They make staff ignore quality", "They only work for teenagers", "They cause physical stress"], a: 1, exp: "Paragraph 3 mentions that employees may lose interest in the quality of their work once they focus only on earning the reward." },
            { q: "Great leaders motivate people by...", opts: ["Giving more money", "Using fear", "Providing purpose and respect", "Setting shorter deadlines"], a: 2, exp: "Paragraph 4 explicitly states that great leaders motivate people by providing a sense of purpose, autonomy, and respect." }
        ],
        ex2: [
            { q: "Fear helps people solve complex problems faster.", a: "False", exp: "Paragraph 2 states that for creative or complex jobs, stress and fear reduce problem-solving abilities." },
            { q: "After a certain point, higher salaries do not increase hard work.", a: "True", exp: "Paragraph 3 states that after a certain point, more money does not mean harder work." }
        ]
    },
    {
        title: "The Science of Sleep",
        topic: "Health · Biology",
        text: `<p>For many years, sleep was considered a passive state — a time when the brain simply rested. Modern science, however, has revealed that the brain is extraordinarily active during sleep. While the body rests, the brain works to process information gathered during the day, strengthen memories, and clear out metabolic waste products that accumulate during waking hours. Without adequate sleep, these essential functions are disrupted.</p>
<p>Teenagers need between 8 and 10 hours of sleep each night, significantly more than adults. However, their body clocks naturally shift during puberty, releasing melatonin — the sleep hormone — later in the evening. This biological change makes it genuinely difficult for most teenagers to fall asleep before midnight, regardless of how hard they try. As a result, early school start times often conflict with adolescent biology.</p>
<p>The consequences of chronic sleep deprivation are serious. Lack of sleep impairs concentration, memory, and decision-making, making it harder to learn effectively. In the long term, consistently poor sleep increases the risk of chronic diseases such as obesity, diabetes, and cardiovascular problems. Experts recommend that schools and parents take teenage sleep needs seriously, rather than dismissing late sleeping as laziness.</p>`,
        ex1: [
            { q: "What does the brain do during sleep?", opts: ["Shuts down completely", "Processes information and clears waste", "Grows physically larger", "Learns new languages automatically"], a: 1, exp: "Paragraph 1 explains that the brain processes information, strengthens memories, and clears out metabolic waste during sleep." },
            { q: "Lack of sleep primarily affects...", opts: ["Muscle growth", "Height", "Concentration and health", "Vision"], a: 2, exp: "Paragraph 3 notes that sleep deprivation impairs concentration and increases the risk of chronic diseases." }
        ],
        ex2: [
            { q: "Teenagers naturally want to stay up late due to biological shifts.", a: "True", exp: "Paragraph 2 explains that the body clock shifts during puberty, releasing melatonin later and making it hard to sleep before midnight." },
            { q: "Most adults need the same amount of sleep as teenagers.", a: "False", exp: "Paragraph 2 states that teenagers need 8–10 hours, which is significantly more than adults typically require." }
        ]
    },
    {
        title: "Social Media and Teenagers",
        topic: "Technology · Society",
        text: `<p>Social media platforms have transformed the way teenagers communicate and see the world. On one hand, these platforms allow young people to connect with friends globally, share their interests, and access information instantly. On the other hand, they create intense pressure to maintain a perfect image. Users carefully select and edit photos, presenting an idealised version of their lives. This 'curated reality' can lead to lower self-esteem, as teenagers compare their ordinary lives to the highlight reels of others.</p>
<p>From a neurological perspective, the act of scrolling through social media triggers repeated releases of dopamine — a chemical in the brain associated with pleasure and reward. This mechanism is similar to the way gambling activates the brain's reward system, making social media platforms psychologically addictive. Users keep scrolling in search of the next 'like' or exciting post, even when they intend to stop.</p>
<p>However, it would be inaccurate to say that social media has zero benefits for teenagers. When used thoughtfully, it can be a powerful tool for creative expression — through photography, writing, or video production. Many young people also use social media to join educational groups, access tutorials, and participate in communities that share their academic or professional interests. The key, according to experts, lies in balance and digital literacy: teaching teenagers to use these platforms intentionally rather than compulsively.</p>`,
        ex1: [
            { q: "The 'curated reality' of social media can cause...", opts: ["Lower self-esteem", "Higher fitness", "Better memory", "More money"], a: 0, exp: "Paragraph 1 directly links curated reality — idealised images of others' lives — to lower self-esteem in teenagers." },
            { q: "Scrolling social media is compared to...", opts: ["Playing sports", "Gambling", "Reading a book", "Sleeping"], a: 1, exp: "Paragraph 2 compares the dopamine release from scrolling to the way gambling activates the brain's reward system." }
        ],
        ex2: [
            { q: "Social media has zero benefits for teenagers.", a: "False", exp: "Paragraph 3 explicitly states it would be inaccurate to say social media has zero benefits, citing creative expression and educational uses." },
            { q: "Dopamine is released during excessive scrolling.", a: "True", exp: "Paragraph 2 explicitly states that scrolling triggers repeated releases of dopamine in the brain." }
        ]
    },
    {
        title: "The Gig Economy",
        topic: "Work · Economics",
        text: `<p>The term 'gig economy' refers to a labour market characterised by short-term contracts, freelance work, and on-demand employment, rather than permanent jobs. Workers in this system — such as delivery drivers, graphic designers, and private tutors — are typically classified as independent contractors rather than employees. While this arrangement offers considerable flexibility to choose when and where to work, it comes with a significant downside: workers lack traditional employment benefits such as sick pay, paid holidays, and company pensions.</p>
<p>The appeal of the gig economy varies considerably across age groups. Young professionals, in particular, tend to value the freedom and flexibility it provides. Many prefer the ability to manage their own schedules, take on multiple clients, and pursue passion projects alongside paid work. For this group, the traditional nine-to-five model can feel restrictive. However, for older workers — especially those with families and financial commitments — job security remains a major concern. Without the safety net of a permanent contract, unexpected illness or a sudden drop in demand can lead to serious financial hardship.</p>
<p>Governments around the world are currently debating how to regulate gig work fairly. Some argue that platform companies exploit workers by denying them employee rights, while others believe that heavy regulation would undermine the flexibility that makes gig work attractive in the first place. Finding the right balance is one of the defining economic challenges of the twenty-first century.</p>`,
        ex1: [
            { q: "A major disadvantage of the gig economy is...", opts: ["Too much free time", "Lack of pensions and sick pay", "Strict office rules", "Long commutes"], a: 1, exp: "Paragraph 1 explicitly lists the lack of traditional benefits such as sick pay, paid holidays, and pensions as a key disadvantage." },
            { q: "Who values flexibility most?", opts: ["The older workforce", "Young professionals", "Government officials", "Pensioners"], a: 1, exp: "Paragraph 2 states that young professionals, in particular, value the freedom and flexibility the gig economy provides." }
        ],
        ex2: [
            { q: "Gig work is characterized by permanent, long-term jobs.", a: "False", exp: "Paragraph 1 defines gig work specifically as short-term contracts and freelance work, not permanent employment." },
            { q: "Job security is a concern for older workers in this economy.", a: "True", exp: "Paragraph 2 explicitly states that for older workers with families and financial commitments, job security remains a major concern." }
        ]
    },
    {
        title: "AI in Education",
        topic: "Technology · Education",
        text: `<p>Artificial intelligence is rapidly changing the landscape of education. One of its most promising applications is the creation of personalised learning paths — systems that analyse each student's strengths, weaknesses, and pace of progress, then adapt the curriculum accordingly. Rather than following a one-size-fits-all syllabus, students using AI-powered tools can advance through material at their own speed, spending more time on challenging topics and less on concepts they have already mastered. This approach allows students to progress at their own individual pace, something traditional classroom teaching often struggles to achieve.</p>
<p>AI also offers significant benefits to teachers. By automating time-consuming tasks such as grading multiple-choice tests, tracking attendance, and generating progress reports, AI frees up valuable time that educators can redirect towards more meaningful activities — such as mentoring students, designing creative lessons, and providing individual support.</p>
<p>However, not everyone is enthusiastic. Critics argue that increased reliance on AI in schools could reduce the amount of human interaction that students experience — interaction that many psychologists consider vital for emotional development, social skills, and mental wellbeing. A child who learns primarily through a screen may miss out on the collaborative, conversational, and empathetic dimensions of education that a human teacher naturally provides. Most experts therefore argue that AI should serve as a powerful tool to support teachers, not as a replacement for them.</p>`,
        ex1: [
            { q: "AI helps teachers by...", opts: ["Replacing them", "Automating grading", "Taking students home", "Cleaning classrooms"], a: 1, exp: "Paragraph 2 states that AI saves teachers time by automating grading, attendance tracking, and progress reports." },
            { q: "What is a main concern about AI?", opts: ["It is too cheap", "Reduced human interaction", "It works too fast", "It only speaks English"], a: 1, exp: "Paragraph 3 states that critics argue AI could reduce human interaction, which is vital for emotional development and social skills." }
        ],
        ex2: [
            { q: "AI allows students to progress at their own speed.", a: "True", exp: "Paragraph 1 explicitly states that AI-powered tools allow students to advance through material at their own individual pace." },
            { q: "Critics believe AI should replace teachers entirely.", a: "False", exp: "Paragraph 3 states that most experts argue AI should serve as a tool to support teachers, not replace them." }
        ]
    }
];

let state = { textIdx: null, name: "", ans1: [], ans2: [], timeLeft: 480, interval: null };

function init() {
    const list = document.getElementById('text-list');
    DATA.forEach((t, i) => {
        list.innerHTML += `<div class="ts-btn" id="ts-${i}" onclick="setIdx(${i})"><div class="ts-num">${i+1}</div><div><b>${t.title}</b><br><small>${t.topic}</small></div></div>`;
    });
}
function setIdx(i) {
    state.textIdx = i;
    document.querySelectorAll('.ts-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById(`ts-${i}`).classList.add('selected');
    document.getElementById('next-btn').disabled = false;
    document.getElementById('next-btn').style.opacity = 1;
}
function startQuiz() {
    state.name = document.getElementById('user-name').value || "Student";
    showScreen('quiz-screen');
    const t = DATA[state.textIdx];
    document.getElementById('q-title').innerText = t.title;
    document.getElementById('article-content').innerHTML = t.text;
    let ex1H = `<div class="exercise-block"><div class="exercise-header">Multiple Choice</div><div class="exercise-body">`;
    t.ex1.forEach((q, i) => {
        ex1H += `<div style="margin-bottom:20px"><b>${i+1}. ${q.q}</b>`;
        q.opts.forEach((o, oi) => { ex1H += `<div class="opt" id="ex1-q${i}-o${oi}" onclick="pick1(${i},${oi})"><div class="opt-lbl">${String.fromCharCode(65+oi)}</div> ${o}</div>`; });
        ex1H += `</div>`;
    });
    document.getElementById('ex1-render').innerHTML = ex1H + `</div></div>`;
    let ex2H = `<div class="exercise-block"><div class="exercise-header">True or False</div><div class="exercise-body">`;
    t.ex2.forEach((q, i) => {
        ex2H += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
            <div style="flex:1;"><b>${i+1}.</b> ${q.q}</div>
            <div class="tf-row">
                <div class="tf-btn" id="q2-${i}-T" onclick="pick2(${i},'True')">True</div>
                <div class="tf-btn" id="q2-${i}-F" onclick="pick2(${i},'False')">False</div>
            </div>
        </div>`;
    });
    document.getElementById('ex2-render').innerHTML = ex2H + `</div></div>`;
    state.interval = setInterval(() => {
        state.timeLeft--;
        let m = Math.floor(state.timeLeft/60), s = state.timeLeft%60;
        document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
        if(state.timeLeft <= 0) endQuiz();
    }, 1000);
}
function pick1(qI, oI) {
    state.ans1[qI] = oI;
    DATA[state.textIdx].ex1[qI].opts.forEach((_, i) => document.getElementById(`ex1-q${qI}-o${i}`).classList.remove('selected'));
    document.getElementById(`ex1-q${qI}-o${oI}`).classList.add('selected');
}
function pick2(qI, val) {
    state.ans2[qI] = val;
    document.getElementById(`q2-${qI}-T`).classList.remove('selected');
    document.getElementById(`q2-${qI}-F`).classList.remove('selected');
    document.getElementById(`q2-${qI}-${val[0]}`).classList.add('selected');
}
function endQuiz() {
    clearInterval(state.interval);
    const t = DATA[state.textIdx];
    let score = 0, total = t.ex1.length + t.ex2.length, rev = "";
    t.ex1.forEach((q, i) => {
        const correct = state.ans1[i] === q.a;
        if(correct) score++;
        rev += `<div class="rv-item ${correct?'rv-correct-box':'rv-wrong-box'}"><b>${q.q}</b><br><br><div class="${correct?'text-green':'text-red'}">${correct?'✓ Correct':'✗ Your answer: '+(q.opts[state.ans1[i]]||'None')}</div>${!correct?`<div class="text-green">Correct: ${q.opts[q.a]}</div>`:''}<div class="explanation"><b>Feedback:</b> ${q.exp}</div></div>`;
    });
    t.ex2.forEach((q, i) => {
        const correct = state.ans2[i] === q.a;
        if(correct) score++;
        rev += `<div class="rv-item ${correct?'rv-correct-box':'rv-wrong-box'}"><b>${q.q}</b><br><br><div class="${correct?'text-green':'text-red'}">${correct?'✓ Correct':'✗ Your answer: '+(state.ans2[i]||'None')}</div>${!correct?`<div class="text-green">Correct: ${q.a}</div>`:''}<div class="explanation"><b>Feedback:</b> ${q.exp}</div></div>`;
    });

    fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: state.name, text: t.title, score: `${score}/${total}`, timestamp: new Date().toLocaleString() })
    }).catch(e => console.log("Sheet Error:", e));

    showScreen('result-screen');
    document.getElementById('res-header').innerHTML = `${state.name}'s Results`;
    document.getElementById('score-box').innerText = `${score} / ${total}`;
    document.getElementById('review-area').innerHTML = rev;
}
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}
init();
</script>
</body>
</html>
