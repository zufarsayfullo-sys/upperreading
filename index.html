<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxford Navigate B2 · Reading Comprehension</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,400&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:    #0e0e16;
            --amber:  #c8933a;
            --amber2: #e8b45a;
            --amber3: #f5d080;
            --cream:  #f2ebe0;
            --muted:  rgba(242,235,224,0.5);
            --red:    #ff4444; 
            --green:  #3a9e68; 
            --border: rgba(200,147,58,0.22);
            --glass:  rgba(255,255,255,0.03);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Mulish',sans-serif; min-height:100vh; background:var(--ink); color:var(--cream); overflow-x:hidden; }
        .bg { position:fixed; inset:0; z-index:0; background: radial-gradient(ellipse 60% 40% at 20% 30%, rgba(200,147,58,0.09) 0%, transparent 65%), linear-gradient(160deg, #080810 0%, #0e0e18 100%); }
        #app { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .card { background:rgba(12,12,20,0.94); backdrop-filter:blur(24px); border:1px solid var(--border); border-radius:22px; width:100%; max-width:900px; box-shadow:0 40px 100px rgba(0,0,0,0.7); overflow:hidden; }

        .screen { padding:40px; display:none; }
        .active { display:block; }

        /* Selector UI */
        .ts-btn { background:var(--glass); border:1.5px solid var(--border); border-radius:12px; padding:15px; cursor:pointer; margin-bottom:10px; display:flex; align-items:center; gap:15px; transition:0.2s; }
        .ts-btn:hover { background:rgba(200,147,58,0.08); transform:translateX(5px); }
        .ts-btn.selected { border-color:var(--amber2); background:rgba(200,147,58,0.12); }
        .ts-num { font-family:'Lora',serif; font-size:22px; color:var(--amber2); min-width:30px; }

        /* Reading UI */
        .article-wrap { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.07); border-radius:14px; padding:20px; margin-bottom:25px; max-height:280px; overflow-y:auto; line-height:1.8; color:rgba(242,235,224,0.85); }
        .exercise-block { border:1px solid var(--border); border-radius:12px; margin-bottom:20px; overflow:hidden; }
        .exercise-header { background:rgba(200,147,58,0.08); padding:12px 15px; font-weight:700; color:var(--amber2); font-size:14px; text-transform:uppercase; letter-spacing:1px; }
        .exercise-body { padding:20px; }

        /* Interactive Elements - Neutral until end */
        .opt { background:var(--glass); border:1.5px solid rgba(255,255,255,0.1); border-radius:8px; padding:12px; cursor:pointer; margin-top:8px; display:flex; align-items:center; gap:10px; transition:0.2s; }
        .opt.selected { border-color:var(--amber); background:rgba(200,147,58,0.15); }
        .opt-lbl { width:22px; height:22px; border-radius:50%; border:1px solid rgba(255,255,255,0.3); display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; }
        
        .tf-row { display:flex; gap:10px; width:180px; }
        .tf-btn { flex:1; padding:10px; border:1px solid rgba(255,255,255,0.1); border-radius:8px; text-align:center; cursor:pointer; background:var(--glass); transition:0.2s; }
        .tf-btn.selected { background:var(--amber); color:var(--ink); font-weight:700; border-color:var(--amber); }

        /* Result Classes */
        .rv-item { background:rgba(255,255,255,0.03); border-radius:10px; padding:18px; margin-bottom:12px; border-left:4px solid transparent; }
        .rv-correct-box { border-left-color: var(--green); }
        .rv-wrong-box { border-left-color: var(--red); }
        .text-green { color: var(--green); font-weight:700; }
        .text-red { color: var(--red); font-weight:700; }
        .explanation { font-size:13px; color:var(--muted); margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.05); font-style:italic; }

        .btn { padding:14px 28px; border-radius:8px; border:none; cursor:pointer; font-weight:700; transition:0.3s; font-family:'Mulish'; }
        .btn-primary { background:var(--amber); color:var(--ink); width:100%; }
        .btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 10px 20px rgba(200,147,58,0.3); }

        @media (max-width: 600px) { .screen { padding:20px; } .tf-row { width:100%; } }
    </style>
</head>
<body>
<div class="bg"></div>
<div id="app">
    <div class="card">
        <div id="intro-screen" class="screen active">
            <div style="text-align:center; margin-bottom:30px;">
                <div style="font-size:12px; letter-spacing:4px; color:var(--amber); margin-bottom:10px;">OXFORD NAVIGATE B2</div>
                <h1 style="font-family:'Lora'; font-size:32px;">Reading <em>Comprehension</em></h1>
            </div>
            <div id="text-list"></div>
            <button class="btn btn-primary" onclick="showScreen('name-screen')" id="next-btn" disabled style="margin-top:10px; opacity:0.4;">Select a text to begin →</button>
        </div>

        <div id="name-screen" class="screen">
            <h2 style="font-family:'Lora'; margin-bottom:15px;">Student <em>Identification</em></h2>
            <p style="color:var(--muted); margin-bottom:20px;">Please enter your full name for the teacher's records.</p>
            <input type="text" id="user-name" placeholder="Firstname Lastname" style="width:100%; padding:16px; margin-bottom:20px; background:var(--glass); border:1px solid var(--amber); color:white; border-radius:10px; font-size:16px; outline:none;">
            <button class="btn btn-primary" onclick="startQuiz()">Start Reading Assessment</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:15px;">
                <div>
                    <div id="q-topic" style="font-size:10px; color:var(--amber); letter-spacing:2px; text-transform:uppercase;"></div>
                    <h3 id="q-title" style="font-family:'Lora';"></h3>
                </div>
                <div id="timer" style="font-size:24px; font-family:'Lora'; color:var(--amber2)">08:00</div>
            </div>
            <div class="article-wrap" id="article-content"></div>
            <div id="ex1-render"></div>
            <div id="ex2-render"></div>
            <button class="btn btn-primary" onclick="endQuiz()">Submit Final Answers</button>
        </div>

        <div id="result-screen" class="screen">
            <h2 id="res-header" style="font-family:'Lora'; text-align:center;"></h2>
            <div id="score-box" style="font-size:48px; text-align:center; margin:20px 0; font-family:'Lora'; color:var(--amber2)"></div>
            <div id="review-area"></div>
            <button class="btn btn-primary" onclick="location.reload()" style="margin-top:20px;">Return to Menu</button>
        </div>
    </div>
</div>

<script>
const DATA = [
    {
        title: "The Carrot or the Stick?",
        topic: "Business · Psychology",
        text: "<p>In business, managers look for ways to improve staff productivity. The 'carrot and the stick' is a classic metaphor. The 'carrot' is a reward (bonus/promotion), while the 'stick' is punishment (fear of job loss).</p><p>Historically, the 'stick' was common in factories. Owners thought people were lazy. This works for simple, repetitive tasks. However, for creative jobs, stress and fear reduce problem-solving abilities.</p><p>The 'carrot' approach is more positive, using prizes or money. But psychologists find that after a certain point, more money doesn't mean harder work. Employees may lose interest in quality.</p>",
        ex1: [
            { q: "The 'stick' method works best for...", opts: ["Creative work", "Simple, repetitive tasks", "Team building", "High-level management"], a: 1, exp: "Paragraph 2 states the stick approach works well for simple, repetitive tasks where the worker does not need to think too much." },
            { q: "Financial rewards (carrots) can be negative because...", opts: ["They are too expensive", "They make staff ignore quality", "They only work for teenagers", "They cause physical stress"], a: 1, exp: "Paragraph 3 mentions that if the only goal is money, employees often lose interest in the quality of their work." }
        ],
        ex2: [
            { q: "Fear helps people solve complex problems faster.", a: "False", exp: "Paragraph 2 states that for jobs requiring complex skills, fear is harmful and decreases problem-solving ability." },
            { q: "After a certain point, higher salaries do not increase hard work.", a: "True", exp: "Paragraph 3 directly states that after a certain point, a higher salary does not make people work harder." }
        ]
    },
    {
        title: "The Science of Sleep",
        topic: "Health · Biology",
        text: "<p>Sleep was once thought to be a passive state. Modern science shows the brain is highly active during sleep. It processes information, strengthens memories, and clears waste.</p><p>Teenagers need between 8 and 10 hours of sleep. However, their body clocks naturally shift, making it hard to sleep before midnight. Lack of sleep impairs concentration and increases risks of heart disease and diabetes.</p>",
        ex1: [
            { q: "What does the brain do during sleep?", opts: ["It completely shuts down", "It processes memories and clears waste", "It creates new physical cells", "It only rests for one hour"], a: 1, exp: "Paragraph 1 explains that the brain is extremely active, processing information and clearing out harmful waste." }
        ],
        ex2: [
            { q: "Teenagers naturally want to stay up late due to biological shifts.", a: "True", exp: "Paragraph 2 explains that their natural body clock shifts during adolescence, making it difficult to sleep early." }
        ]
    },
    {
        title: "Social Media and Teenagers",
        topic: "Technology · Society",
        text: "<p>Social media has transformed how teenagers interact. While it allows for global connection, it also creates pressure to maintain a perfect online image. This 'curated reality' can lead to lower self-esteem.</p><p>Studies show that excessive scrolling triggers dopamine releases similar to gambling. However, when used for creative expression or educational groups, social media has significant benefits.</p>",
        ex1: [
            { q: "The 'curated reality' of social media can cause...", opts: ["Better photography skills", "Lower self-esteem", "Higher grades", "Increased physical fitness"], a: 1, exp: "Paragraph 1 mentions that the pressure to maintain a perfect image can lead to lower self-esteem." }
        ],
        ex2: [
            { q: "Social media use can trigger chemical reactions in the brain.", a: "True", exp: "Paragraph 2 mentions the release of dopamine, which is a chemical reaction similar to gambling." }
        ]
    },
    {
        title: "The Gig Economy",
        topic: "Work · Economics",
        text: "<p>The 'gig economy' refers to a labor market characterized by short-term contracts or freelance work rather than permanent jobs. While it offers flexibility, it lacks traditional benefits like sick pay and pensions.</p><p>For many young professionals, the ability to choose when and where they work is highly valued. However, the lack of job security remains a major concern for the older workforce.</p>",
        ex1: [
            { q: "A major disadvantage of the gig economy is...", opts: ["Too much free time", "Lack of pensions and sick pay", "Having to work in an office", "Strict 9-to-5 schedules"], a: 1, exp: "Paragraph 1 states it lacks traditional benefits like sick pay and pensions." }
        ],
        ex2: [
            { q: "Young professionals usually hate the flexibility of gig work.", a: "False", exp: "Paragraph 2 says the ability to choose when and where they work is highly valued by young professionals." }
        ]
    },
    {
        title: "AI in Education",
        topic: "Technology · Education",
        text: "<p>Artificial Intelligence is changing classrooms. AI can provide personalized learning paths for students, allowing them to progress at their own speed. It also automates grading for teachers, saving hours of administrative time.</p><p>Critics argue that AI might reduce human interaction, which is vital for emotional development. They believe AI should be a tool for teachers, not a replacement for them.</p>",
        ex1: [
            { q: "How does AI help teachers directly?", opts: ["By teaching physical education", "By automating grading and admin", "By replacing them entirely", "By reducing student numbers"], a: 1, exp: "Paragraph 1 states AI automates grading, saving hours of administrative time for teachers." }
        ],
        ex2: [
            { q: "Critics believe AI is a perfect replacement for human teachers.", a: "False", exp: "Paragraph 2 says critics believe AI should be a tool, not a replacement, due to the need for human interaction." }
        ]
    }
];

let state = { textIdx: null, name: "", ans1: [], ans2: [], timeLeft: 480, interval: null };

function init() {
    const list = document.getElementById('text-list');
    DATA.forEach((t, i) => {
        list.innerHTML += `<div class="ts-btn" id="ts-${i}" onclick="setIdx(${i})"><div class="ts-num">${i+1}</div><div><b>${t.title}</b><br><small style="color:var(--muted)">${t.topic}</small></div></div>`;
    });
}

function setIdx(i) {
    state.textIdx = i;
    document.querySelectorAll('.ts-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById(`ts-${i}`).classList.add('selected');
    document.getElementById('next-btn').disabled = false;
    document.getElementById('next-btn').style.opacity = 1;
}

function startQuiz() {
    state.name = document.getElementById('user-name').value || "Student";
    showScreen('quiz-screen');
    const t = DATA[state.textIdx];
    document.getElementById('q-title').innerText = t.title;
    document.getElementById('q-topic').innerText = t.topic;
    document.getElementById('article-content').innerHTML = t.text;
    
    // Render Ex 1
    let ex1H = `<div class="exercise-block"><div class="exercise-header">Exercise 1: Sentence Completion</div><div class="exercise-body">`;
    t.ex1.forEach((q, i) => {
        ex1H += `<div style="margin-bottom:20px"><div style="margin-bottom:10px"><b>${i+1}.</b> ${q.q}</div>`;
        q.opts.forEach((o, oi) => {
            ex1H += `<div class="opt" id="ex1-q${i}-o${oi}" onclick="pick1(${i},${oi})"><div class="opt-lbl">${String.fromCharCode(65+oi)}</div> ${o}</div>`;
        });
        ex1H += `</div>`;
    });
    document.getElementById('ex1-render').innerHTML = ex1H + `</div></div>`;

    // Render Ex 2
    let ex2H = `<div class="exercise-block"><div class="exercise-header">Exercise 2: True or False</div><div class="exercise-body">`;
    t.ex2.forEach((q, i) => {
        ex2H += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
            <div style="flex:1; min-width:200px;"><b>${i+1}.</b> ${q.q}</div>
            <div class="tf-row">
                <div class="tf-btn" id="q2-${i}-T" onclick="pick2(${i},'True')">True</div>
                <div class="tf-btn" id="q2-${i}-F" onclick="pick2(${i},'False')">False</div>
            </div>
        </div>`;
    });
    document.getElementById('ex2-render').innerHTML = ex2H + `</div></div>`;

    state.interval = setInterval(() => {
        state.timeLeft--;
        let m = Math.floor(state.timeLeft/60), s = state.timeLeft%60;
        document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
        if(state.timeLeft <= 0) endQuiz();
    }, 1000);
}

function pick1(qI, oI) {
    state.ans1[qI] = oI;
    DATA[state.textIdx].ex1[qI].opts.forEach((_, i) => document.getElementById(`ex1-q${qI}-o${i}`).classList.remove('selected'));
    document.getElementById(`ex1-q${qI}-o${oI}`).classList.add('selected');
}
function pick2(qI, val) {
    state.ans2[qI] = val;
    document.getElementById(`q2-${qI}-T`).classList.remove('selected');
    document.getElementById(`q2-${qI}-F`).classList.remove('selected');
    document.getElementById(`q2-${qI}-${val[0]}`).classList.add('selected');
}

function endQuiz() {
    clearInterval(state.interval);
    showScreen('result-screen');
    const t = DATA[state.textIdx];
    let score = 0, total = t.ex1.length + t.ex2.length, rev = "";

    t.ex1.forEach((q, i) => {
        const correct = state.ans1[i] === q.a;
        if(correct) score++;
        rev += `<div class="rv-item ${correct?'rv-correct-box':'rv-wrong-box'}">
            <div style="font-size:12px; color:var(--amber); margin-bottom:5px;">QUESTION ${i+1}</div>
            <b>${q.q}</b><br><br>
            <div class="${correct?'text-green':'text-red'}">${correct?'✓ Correct':'✗ Your answer: '+(q.opts[state.ans1[i]]||'None')}</div>
            ${!correct?`<div class="text-green">Correct Answer: ${q.opts[q.a]}</div>`:''}
            <div class="explanation"><b>Feedback:</b> ${q.exp}</div>
        </div>`;
    });

    t.ex2.forEach((q, i) => {
        const correct = state.ans2[i] === q.a;
        if(correct) score++;
        rev += `<div class="rv-item ${correct?'rv-correct-box':'rv-wrong-box'}">
            <div style="font-size:12px; color:var(--amber); margin-bottom:5px;">T/F QUESTION ${i+1}</div>
            <b>${q.q}</b><br><br>
            <div class="${correct?'text-green':'text-red'}">${correct?'✓ Correct':'✗ Your answer: '+(state.ans2[i]||'None')}</div>
            ${!correct?`<div class="text-green">Correct Answer: ${q.a}</div>`:''}
            <div class="explanation"><b>Feedback:</b> ${q.exp}</div>
        </div>`;
    });

    document.getElementById('res-header').innerHTML = `${state.name}'s <em>Report</em>`;
    document.getElementById('score-box').innerText = `${score} / ${total}`;
    document.getElementById('review-area').innerHTML = rev;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}
init();
</script>
</body>
</html>
